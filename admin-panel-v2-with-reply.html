<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Адмін · Відгуки</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #fff;
  --surf:   #FAFAFA;
  --card:   #fff;
  --border: #E8E8E8;
  --ink:    #111;
  --muted:  #AAA;
  --muted2: #DDD;
  --ok:     #4A7A5A;
  --ok-bg:  #F0F7F2;
  --warn:   #9A6A20;
  --warn-bg:#FBF5EC;
  --err:    #A04040;
  --err-bg: #FDF0F0;
  --ff:     'DM Sans', sans-serif;
  --ffs:    'Libre Baskerville', serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: #F4F2EF; color: var(--ink); font-family: var(--ff); font-weight: 300; font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); }

/* ── LOGIN ─────────────────────────────── */
#login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#F4F2EF; }
.login-box {
  width:360px; background:#fff;
  border: 1px solid var(--border);
  padding:48px 40px 40px; position:relative;
  box-shadow: 0 4px 32px rgba(0,0,0,.06);
}
.login-box::before { content:''; position:absolute; top:0; left:0; width:48px; height:2px; background:var(--ink); }
.login-eyebrow { font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.login-title { font-family:var(--ffs); font-size:24px; font-style:italic; font-weight:400; margin-bottom:32px; line-height:1.2; color:var(--ink); }
.login-field { margin-bottom:16px; }
.login-field label { display:block; font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
.login-field input { width:100%; padding:10px 14px; background:var(--surf); border:1px solid var(--border); color:var(--ink); font-family:var(--ff); font-size:14px; outline:none; transition:border-color .2s; }
.login-field input:focus { border-color:var(--ink); background:#fff; }
.btn-login { width:100%; padding:13px; background:var(--ink); color:#fff; font-family:var(--ff); font-size:10px; font-weight:500; letter-spacing:.18em; text-transform:uppercase; border:none; cursor:pointer; margin-top:8px; transition:background .2s; }
.btn-login:hover { background:#333; }
.login-err { font-size:12px; color:var(--err); text-align:center; margin-top:12px; min-height:18px; }

/* ── APP ───────────────────────────────── */
#app { display:none; }

/* HEADER */
.adm-header { background:#fff; border-bottom:1px solid var(--border); padding:0 32px; display:flex; align-items:center; justify-content:space-between; height:56px; position:sticky; top:0; z-index:100; box-shadow:0 1px 0 var(--border); }
.adm-logo { font-family:var(--ffs); font-size:17px; font-style:italic; font-weight:400; color:var(--ink); }
.adm-logo span { font-style:normal; }
.adm-meta { display:flex; align-items:center; gap:20px; font-size:12px; color:var(--muted); }
.btn-logout { font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); background:none; border:1px solid var(--border); padding:6px 14px; cursor:pointer; transition:all .2s; font-family:var(--ff); }
.btn-logout:hover { color:var(--ink); border-color:var(--ink); }

/* LAYOUT */
.adm-body { display:flex; min-height:calc(100vh - 56px); }

/* SIDEBAR */
.adm-sidebar { width:216px; background:#fff; border-right:1px solid var(--border); padding:24px 0; flex-shrink:0; position:sticky; top:56px; height:calc(100vh - 56px); overflow-y:auto; }
.sidebar-section { font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted2); padding:0 20px; margin-bottom:6px; margin-top:22px; }
.sidebar-section:first-child { margin-top:0; }
.sidebar-btn { display:flex; align-items:center; gap:10px; width:100%; padding:8px 20px; font-family:var(--ff); font-size:13px; font-weight:300; color:var(--muted); background:none; border:none; cursor:pointer; text-align:left; transition:color .15s, background .15s; position:relative; }
.sidebar-btn:hover { color:var(--ink); background:rgba(0,0,0,.025); }
.sidebar-btn.active { color:var(--ink); font-weight:400; }
.sidebar-btn.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--ink); }
.sidebar-count { margin-left:auto; font-size:10px; font-weight:500; background:var(--ink); color:#fff; padding:1px 7px; min-width:20px; text-align:center; }
.sidebar-count.grey { background:var(--muted2); color:var(--muted); }

/* CONTENT */
.adm-content { flex:1; padding:32px 36px; overflow-x:hidden; }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:32px; }
.stat-card { background:#fff; border:1px solid var(--border); padding:20px 22px; position:relative; }
.stat-card::before { content:''; position:absolute; top:0; left:0; width:28px; height:1px; background:var(--ink); }
.stat-card.ok::before   { background:var(--ok); }
.stat-card.warn::before { background:var(--warn); }
.stat-card.err::before  { background:var(--err); }
.stat-label { font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.stat-num { font-family:var(--ffs); font-size:36px; font-weight:400; line-height:1; color:var(--ink); }
.stat-sub { font-size:11px; color:var(--muted); margin-top:4px; }

/* TOOLBAR */
.toolbar { display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.toolbar-search { flex:1; min-width:200px; padding:9px 14px; background:#fff; border:1px solid var(--border); color:var(--ink); font-family:var(--ff); font-size:13px; outline:none; transition:border-color .2s; }
.toolbar-search:focus { border-color:var(--ink); }
.toolbar-search::placeholder { color:var(--muted2); }
.toolbar-select { padding:9px 14px; background:#fff; border:1px solid var(--border); color:var(--muted); font-family:var(--ff); font-size:12px; outline:none; cursor:pointer; -webkit-appearance:none; }
.toolbar-select:focus { border-color:var(--ink); }
.toolbar-select option { background:#fff; }
.btn-sm { padding:8px 14px; font-family:var(--ff); font-size:9px; font-weight:400; letter-spacing:.12em; text-transform:uppercase; border:1px solid; cursor:pointer; transition:all .15s; white-space:nowrap; background:transparent; }
.btn-approve { color:var(--ok); border-color:#C8DFD0; }
.btn-approve:hover { background:var(--ok-bg); border-color:var(--ok); }
.btn-reject  { color:var(--warn); border-color:#E8D8B8; background:var(--warn-bg); }
.btn-reject:hover  { border-color:var(--warn); }
.btn-delete  { color:var(--err); border-color:#F0CCCC; background:var(--err-bg); }
.btn-delete:hover  { border-color:var(--err); }
.btn-edit    { color:var(--ink); border-color:var(--border); }
.btn-edit:hover { background:var(--surf); border-color:var(--ink); }

/* TABLE */
.rev-table { width:100%; border-collapse:collapse; }
.rev-table th { font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); font-weight:400; text-align:left; padding:0 12px 12px; border-bottom:1px solid var(--ink); white-space:nowrap; }
.rev-table th:first-child { padding-left:0; }
.rev-table td { padding:16px 12px; border-bottom:1px solid var(--border); vertical-align:top; font-size:13px; }
.rev-table td:first-child { padding-left:0; }
.rev-table tr:hover td { background:var(--surf); }
.rev-table input[type=checkbox] { width:15px; height:15px; accent-color:var(--ink); cursor:pointer; }

.rev-author { font-family:var(--ffs); font-size:15px; color:var(--ink); line-height:1.2; font-weight:400; }
.rev-product { font-size:11px; color:var(--muted); letter-spacing:.04em; margin-top:2px; }
.rev-date { font-size:10px; color:var(--muted); margin-top:4px; letter-spacing:.06em; }
.rev-title { font-weight:400; color:var(--ink); margin-bottom:4px; font-family:var(--ffs); font-style:italic; }
.rev-body { color:#666; font-size:12px; line-height:1.6; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; max-width:320px; }

.stars-mini { display:flex; gap:2px; }
.star-mini { width:11px; height:11px; fill:var(--ink); }
.star-mini.e { fill:var(--muted2); }

.status { display:inline-flex; align-items:center; gap:5px; font-size:9px; letter-spacing:.12em; text-transform:uppercase; font-weight:500; padding:3px 9px; border:1px solid; }
.status-ok   { color:var(--ok);   border-color:#C8DFD0; background:var(--ok-bg); }
.status-pend { color:var(--warn); border-color:#E8D8B8; background:var(--warn-bg); }

.table-photos { display:flex; gap:4px; margin-top:8px; flex-wrap:wrap; }
.table-photo { width:40px; height:48px; object-fit:cover; cursor:pointer; transition:opacity .2s, transform .2s; }
.table-photo:hover { opacity:.8; transform:scale(1.04); }

.rev-actions { display:flex; flex-direction:column; gap:5px; min-width:110px; }
.rev-actions .btn-sm { font-size:9px; padding:6px 10px; }

/* BULK BAR */
.bulk-bar { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#fff; border:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; gap:16px; box-shadow:0 8px 32px rgba(0,0,0,.1); z-index:200; opacity:0; pointer-events:none; transition:opacity .2s; white-space:nowrap; }
.bulk-bar.show { opacity:1; pointer-events:all; }
.bulk-count { font-size:12px; color:var(--muted); }
.bulk-count strong { color:var(--ink); }

/* STATES */
.tbl-empty { text-align:center; padding:60px 0; font-family:var(--ffs); font-style:italic; font-size:20px; color:var(--muted); }
.tbl-loading { text-align:center; padding:60px 0; }
.spinner { display:inline-block; width:22px; height:22px; border:1px solid var(--border); border-top-color:var(--ink); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* PAGINATION */
.pagination { display:flex; justify-content:center; gap:6px; margin-top:28px; }
.page-btn { width:34px; height:34px; background:none; border:1px solid var(--border); color:var(--muted); font-family:var(--ff); font-size:12px; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; }
.page-btn:hover { border-color:var(--ink); color:var(--ink); }
.page-btn.active { border-color:var(--ink); color:var(--ink); background:var(--surf); font-weight:500; }
.page-btn:disabled { opacity:.3; cursor:not-allowed; }

/* ── EDIT MODAL ─────────────────────────── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; z-index:500; opacity:0; pointer-events:none; transition:opacity .25s; padding:20px; backdrop-filter:blur(2px); }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { background:#fff; border:1px solid var(--border); width:100%; max-width:620px; max-height:90vh; overflow-y:auto; position:relative; transform:translateY(16px); transition:transform .25s; box-shadow:0 16px 48px rgba(0,0,0,.12); }
.modal-overlay.open .modal { transform:translateY(0); }
.modal::before { content:''; position:absolute; top:0; left:0; width:48px; height:2px; background:var(--ink); }
.modal-head { padding:28px 32px 22px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
.modal-eyebrow { font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.modal-title { font-family:var(--ffs); font-size:20px; font-style:italic; font-weight:400; line-height:1.2; color:var(--ink); }
.modal-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; line-height:1; padding:4px; transition:color .2s; flex-shrink:0; }
.modal-close:hover { color:var(--ink); }
.modal-body { padding:24px 32px; display:flex; flex-direction:column; gap:18px; }
.mf { display:flex; flex-direction:column; gap:6px; }
.mf label { font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); }
.mf input[type=text], .mf input[type=datetime-local], .mf textarea { background:var(--surf); border:1px solid var(--border); color:var(--ink); font-family:var(--ff); font-size:14px; font-weight:300; padding:9px 13px; outline:none; transition:border-color .2s; width:100%; }
.mf input:focus, .mf textarea:focus { border-color:var(--ink); background:#fff; }
.mf textarea { resize:vertical; min-height:110px; }
.mf input[type=datetime-local]::-webkit-calendar-picker-indicator { cursor:pointer; opacity:.5; }
.mf-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
@media(max-width:540px){ .mf-row { grid-template-columns:1fr; } }
.modal-stars { display:flex; gap:6px; flex-direction:row-reverse; width:fit-content; }
.modal-stars input { display:none; }
.modal-stars label { font-size:26px; cursor:pointer; color:var(--muted2); transition:color .1s; line-height:1; }
.modal-stars label:hover, .modal-stars label:hover ~ label, .modal-stars input:checked ~ label { color:var(--ink); }
.modal-foot { padding:18px 32px 28px; display:flex; align-items:center; justify-content:flex-end; gap:10px; border-top:1px solid var(--border); }
.btn-save { padding:11px 36px; background:var(--ink); color:#fff; font-family:var(--ff); font-size:10px; font-weight:500; letter-spacing:.16em; text-transform:uppercase; border:none; cursor:pointer; transition:background .2s; }
.btn-save:hover { background:#333; }
.btn-save:disabled { opacity:.4; cursor:not-allowed; }
.btn-cancel { padding:11px 22px; background:none; border:1px solid var(--border); color:var(--muted); font-family:var(--ff); font-size:10px; letter-spacing:.12em; text-transform:uppercase; cursor:pointer; transition:all .2s; }
.btn-cancel:hover { border-color:var(--ink); color:var(--ink); }
.modal-photos { display:flex; gap:8px; flex-wrap:wrap; }
.modal-photo-wrap { position:relative; }
.modal-photo-wrap img { width:72px; height:88px; object-fit:cover; display:block; cursor:pointer; transition:opacity .2s; }
.modal-photo-wrap img:hover { opacity:.8; }
.modal-photo-del { position:absolute; top:2px; right:2px; width:18px; height:18px; background:rgba(160,64,64,.85); border:none; color:#fff; font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* TOAST */
.toast-wrap { position:fixed; top:72px; right:24px; display:flex; flex-direction:column; gap:8px; z-index:9999; pointer-events:none; }
.toast { padding:11px 18px; font-size:12px; letter-spacing:.04em; background:#fff; border:1px solid; animation:toastIn .25s ease; pointer-events:all; max-width:300px; box-shadow:0 4px 16px rgba(0,0,0,.08); }
.toast.ok  { border-color:#C8DFD0; color:var(--ok); }
.toast.err { border-color:#F0CCCC; color:var(--err); }
@keyframes toastIn { from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)} }

/* LIGHTBOX */
.lb { position:fixed; inset:0; background:rgba(0,0,0,.9); display:flex; align-items:center; justify-content:center; z-index:9000; opacity:0; pointer-events:none; transition:opacity .25s; }
.lb.open { opacity:1; pointer-events:all; }
.lb img { max-width:90vw; max-height:85vh; object-fit:contain; }
.lb-x { position:absolute; top:20px; right:24px; font-size:22px; background:none; border:none; color:#888; cursor:pointer; transition:color .2s; }
.lb-x:hover { color:#fff; }

/* RESPONSIVE */
@media(max-width:900px){
  .adm-sidebar { display:none; }
  .stats-row { grid-template-columns:1fr 1fr; }
  .adm-content { padding:20px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-eyebrow">Адміністратор</div>
    <div class="login-title">Панель керування відгуками</div>
    <div class="login-field">
      <label>Пароль</label>
      <input type="password" id="pwd-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="tryLogin()">Увійти</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <header class="adm-header">
    <div class="adm-logo"><span>✦</span> Відгуки · Адмін</div>
    <div class="adm-meta">
      <span id="hdr-pending" style="color:var(--warn-bg);display:none;background:var(--warn-bg);color:var(--warn);padding:4px 10px;font-size:11px;">⚡ <span id="pending-cnt">0</span> на модерації</span>
      <button class="btn-logout" onclick="logout()">Вийти</button>
    </div>
  </header>

  <div class="adm-body">

    <!-- SIDEBAR -->
    <nav class="adm-sidebar">
      <div class="sidebar-section">Статус</div>
      <button class="sidebar-btn active" data-view="pending"  onclick="setView('pending',this)">⏳ На модерації <span class="sidebar-count" id="sb-pending">0</span></button>
      <button class="sidebar-btn"        data-view="approved" onclick="setView('approved',this)">✓ Опубліковані <span class="sidebar-count grey" id="sb-approved">0</span></button>
      <button class="sidebar-btn"        data-view="all"      onclick="setView('all',this)">◻ Всі <span class="sidebar-count grey" id="sb-all">0</span></button>

      <div class="sidebar-section">Рейтинг</div>
      <button class="sidebar-btn active-rating" data-rating="0" onclick="setRating(0,this)">Всі оцінки</button>
      <button class="sidebar-btn" data-rating="5" onclick="setRating(5,this)">★★★★★ — 5</button>
      <button class="sidebar-btn" data-rating="4" onclick="setRating(4,this)">★★★★ — 4</button>
      <button class="sidebar-btn" data-rating="3" onclick="setRating(3,this)">★★★ — 3</button>
      <button class="sidebar-btn" data-rating="2" onclick="setRating(2,this)">★★ — 2</button>
      <button class="sidebar-btn" data-rating="1" onclick="setRating(1,this)">★ — 1</button>
    </nav>

    <!-- CONTENT -->
    <main class="adm-content">

      <!-- STATS -->
      <div class="stats-row">
        <div class="stat-card gold"><div class="stat-label">Середній рейтинг</div><div class="stat-num" id="st-avg">—</div><div class="stat-sub">з 5 зірок</div></div>
        <div class="stat-card ok"><div class="stat-label">Опубліковано</div><div class="stat-num" id="st-approved">0</div><div class="stat-sub">відгуків</div></div>
        <div class="stat-card warn"><div class="stat-label">На модерації</div><div class="stat-num" id="st-pending">0</div><div class="stat-sub">очікують</div></div>
        <div class="stat-card err"><div class="stat-label">Всього</div><div class="stat-num" id="st-total">0</div><div class="stat-sub">відгуків</div></div>
      </div>

      <!-- TOOLBAR -->
      <div class="toolbar">
        <input class="toolbar-search" type="text" id="search-input" placeholder="Пошук по імені, тексту, товару…" oninput="onSearch()">
        <select class="toolbar-select" id="sort-select" onchange="reload()">
          <option value="created_at.desc">Нові спочатку</option>
          <option value="created_at.asc">Старі спочатку</option>
          <option value="rating.desc">Оцінка ↓</option>
          <option value="rating.asc">Оцінка ↑</option>
        </select>
        <button class="btn-sm btn-approve" onclick="bulkAction('approve')">✓ Схвалити вибране</button>
        <button class="btn-sm btn-delete"  onclick="bulkAction('delete')">✕ Видалити вибране</button>
      </div>

      <!-- TABLE -->
      <div id="tbl-wrap"><div class="tbl-loading"><div class="spinner"></div></div></div>
      <div class="pagination" id="pagination"></div>

    </main>
  </div>
</div>

<!-- BULK BAR -->
<div class="bulk-bar" id="bulk-bar">
  <span class="bulk-count">Обрано: <strong id="sel-count">0</strong></span>
  <button class="btn-sm btn-approve" onclick="bulkAction('approve')">✓ Схвалити</button>
  <button class="btn-sm btn-delete"  onclick="bulkAction('delete')">✕ Видалити</button>
  <button class="btn-sm btn-reject"  onclick="clearSel()">Скасувати</button>
</div>

<!-- ── EDIT MODAL ───────────────────────── -->
<div class="modal-overlay" id="edit-overlay" onclick="closeModal(event)">
  <div class="modal" id="edit-modal">
    <div class="modal-head">
      <div>
        <div class="modal-eyebrow">Редагування відгуку</div>
        <div class="modal-title" id="modal-author-label">Ім'я автора</div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>

    <div class="modal-body">

      <!-- ЗІРКИ -->
      <div class="mf">
        <label>Оцінка</label>
        <div class="modal-stars" id="modal-stars">
          <input type="radio" name="m-rating" id="mr5" value="5"><label for="mr5">★</label>
          <input type="radio" name="m-rating" id="mr4" value="4"><label for="mr4">★</label>
          <input type="radio" name="m-rating" id="mr3" value="3"><label for="mr3">★</label>
          <input type="radio" name="m-rating" id="mr2" value="2"><label for="mr2">★</label>
          <input type="radio" name="m-rating" id="mr1" value="1"><label for="mr1">★</label>
        </div>
      </div>

      <div class="mf-row">
        <!-- ІМ'Я -->
        <div class="mf">
          <label>Ім'я автора</label>
          <input type="text" id="m-name" maxlength="60" placeholder="Ольга М.">
        </div>
        <!-- ДАТА -->
        <div class="mf">
          <label>Дата публікації</label>
          <input type="datetime-local" id="m-date">
          <small style="color:var(--muted);font-size:10px;margin-top:4px;font-family:var(--ff)">Можна встановити будь-яку дату</small>
        </div>
      </div>

      <div class="mf-row">
        <!-- ID ТОВАРУ -->
        <div class="mf">
          <label>ID товару</label>
          <input type="text" id="m-product" maxlength="120" placeholder="product-slug">
        </div>
        <!-- РОЗМІР -->
        <div class="mf">
          <label>Розмір підійшов?</label>
          <select id="m-fit" style="background:var(--surf);border:1px solid var(--border);color:var(--ink);font-family:var(--ff);font-size:14px;padding:9px 13px;outline:none;width:100%;-webkit-appearance:none;">
            <option value="">— не вказано —</option>
            <option value="small">Маломірить</option>
            <option value="true">По розміру</option>
            <option value="large">Великомірить</option>
          </select>
        </div>
      </div>

      <!-- ЗАГОЛОВОК -->
      <div class="mf">
        <label>Заголовок відгуку</label>
        <input type="text" id="m-title" maxlength="100" placeholder="Коротке враження…">
      </div>

      <!-- ТЕКСТ -->
      <div class="mf">
        <label>Текст відгуку *</label>
        <textarea id="m-body" maxlength="1400" placeholder="Детальний відгук…" style="min-height:140px"></textarea>
        <small style="color:var(--muted);font-size:10px;text-align:right;font-family:var(--ff)" id="m-char">0 / 1400</small>
      </div>

      <!-- ВІДПОВІДЬ МАГАЗИНУ -->
      <div class="mf">
        <label>Відповідь магазину</label>
        <textarea id="m-reply" placeholder="Напишіть відповідь клієнту…" style="min-height:100px"></textarea>
      </div>

      <!-- ПІДТВЕРДЖЕНА ПОКУПКА -->
      <div class="mf" style="flex-direction:row;align-items:center;gap:12px">
        <input type="checkbox" id="m-verified" style="width:15px;height:15px;accent-color:var(--ink);cursor:pointer;flex-shrink:0">
        <label for="m-verified" style="font-size:12px;color:var(--muted);text-transform:none;letter-spacing:0;cursor:pointer">Підтверджена покупка</label>
      </div>

      <!-- ФОТО -->
      <div class="mf" id="modal-photos-section" style="display:none">
        <label>Фото покупця</label>
        <div class="modal-photos" id="modal-photos"></div>
      </div>

    </div>

    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModalDirect()">Скасувати</button>
      <button class="btn-save" id="btn-save" onclick="saveEdit()">Зберегти зміни</button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-wrap" id="toasts"></div>

<!-- LIGHTBOX -->
<div class="lb" id="lb" onclick="closeLb()">
  <button class="lb-x" onclick="closeLb()">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<script>
/* ══════════════════════════════════════════
   ⚙️  КОНФІГУРАЦІЯ
══════════════════════════════════════════ */
const SUPABASE_URL  = 'https://pjbkmajnbqabkunlikoe.supabase.co';
const SUPABASE_ANON = 'sb_publishable_UXLaCY899UlouOFe_7xG7Q_b8KreJ85';
const ADMIN_PASS    = 'admin1234';                             // ← змінити пароль!
const PAGE_SIZE     = 15;

/* ══════════════════════════════════════════
   AUTH
══════════════════════════════════════════ */
function tryLogin() {
  const v = document.getElementById('pwd-input').value;
  if (v === ADMIN_PASS) {
    sessionStorage.setItem('adm','1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('login-err').textContent = 'Невірний пароль';
    document.getElementById('pwd-input').value = '';
  }
}
function logout() { sessionStorage.removeItem('adm'); location.reload(); }
document.getElementById('pwd-input').addEventListener('keydown', e => { if(e.key==='Enter') tryLogin(); });
if (sessionStorage.getItem('adm')==='1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

/* ══════════════════════════════════════════
   API
══════════════════════════════════════════ */
const H = () => ({
  'Content-Type':'application/json',
  'apikey': SUPABASE_ANON,
  'Authorization': `Bearer ${SUPABASE_ANON}`,
  'Prefer':'return=representation,count=exact',
});

async function sbGet(path) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: H() });
  if (!r.ok) throw new Error(await r.text());
  const data = await r.json();
  const total = r.headers.get('content-range')?.split('/')[1];
  return { data, total: total ? +total : data.length };
}
async function sbPatch(path, body) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method:'PATCH', headers:{...H(),'Prefer':'return=minimal'}, body:JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
}
async function sbDelete(path) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method:'DELETE', headers:{...H(),'Prefer':'return=minimal'}
  });
  if (!r.ok) throw new Error(await r.text());
}

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
window.st = { view:'pending', rating:0, page:0, total:0, search:'', sort:'created_at.desc', selected:new Set(), reviews:[], loading:false };
let st = window.st;
let editingId = null;
let editPhotos = []; // { url, id_to_delete? }

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
async function init() { await loadStats(); await reload(); }

/* ══════════════════════════════════════════
   STATS
══════════════════════════════════════════ */
async function loadStats() {
  try {
    const { data } = await sbGet('reviews?select=rating,approved&limit=10000', true);
    const approved = data.filter(r=>r.approved);
    const pending  = data.filter(r=>!r.approved);
    const avg = approved.length
      ? (approved.reduce((s,r)=>s+r.rating,0)/approved.length).toFixed(1) : '—';
    document.getElementById('st-avg').textContent     = avg;
    document.getElementById('st-approved').textContent = approved.length;
    document.getElementById('st-pending').textContent  = pending.length;
    document.getElementById('st-total').textContent    = data.length;
    document.getElementById('sb-pending').textContent  = pending.length;
    document.getElementById('sb-approved').textContent = approved.length;
    document.getElementById('sb-all').textContent      = data.length;
    const pEl = document.getElementById('hdr-pending');
    document.getElementById('pending-cnt').textContent = pending.length;
    pEl.style.display = pending.length ? '' : 'none';
  } catch(e) { console.warn('Stats', e); }
}

/* ══════════════════════════════════════════
   RELOAD
══════════════════════════════════════════ */
async function reload() {
  st.search = document.getElementById('search-input').value.trim();
  st.sort   = document.getElementById('sort-select').value;
  document.getElementById('tbl-wrap').innerHTML = '<div class="tbl-loading"><div class="spinner"></div></div>';
  try {
    let q = `reviews?select=*&order=${st.sort}&limit=${PAGE_SIZE}&offset=${st.page*PAGE_SIZE}`;
    if (st.view==='pending')  q += '&approved=eq.false';
    if (st.view==='approved') q += '&approved=eq.true';
    if (st.rating) q += `&rating=eq.${st.rating}`;
    if (st.search) {
      const s = encodeURIComponent(st.search);
      q += `&or=(author_name.ilike.*${s}*,body.ilike.*${s}*,product_id.ilike.*${s}*,title.ilike.*${s}*)`;
    }
    const { data, total } = await sbGet(q);
    st.total = total;

    // Завантажуємо всі фото перед рендером
    await Promise.all(data.map(async r => {
      try {
        const result = await sbGet('review_photos?review_id=eq.' + r.id + '&select=id,url&order=created_at.asc');
        const photos = Array.isArray(result) ? result : (result.data || []);
        r._photos = photos.map(p => ({id: p.id, url: p.url}));
      } catch(e) {
        r._photos = [];
      }
    }));

    // Рендеримо один раз — вже з фото
    st.reviews = data;
    renderTable(); renderPagination(); updateBulkBar();

  } catch(e) {
    document.getElementById('tbl-wrap').innerHTML =
      `<p style="text-align:center;color:var(--err);padding:40px">Помилка: ${e.message}</p>`;
  }
}

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtD = iso => new Date(iso).toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit',year:'numeric'});
function starsHtml(n) {
  return Array.from({length:5},(_,i)=>
    `<svg class="star-mini${i<n?'':' e'}" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`
  ).join('');
}

/* ══════════════════════════════════════════
   TABLE RENDER
══════════════════════════════════════════ */
function renderTable() {
  if (!st.reviews.length) {
    document.getElementById('tbl-wrap').innerHTML='<div class="tbl-empty">Відгуків не знайдено</div>';
    return;
  }
  const allChecked = st.reviews.every(r=>st.selected.has(r.id));
  const rows = st.reviews.map(r => {
    const chk = st.selected.has(r.id) ? 'checked' : '';
    const status = r.approved
      ? '<span class="status status-ok">✓ Опубліковано</span>'
      : '<span class="status status-pend">⏳ Модерація</span>';
    const photos = (r._photos||[]).map(p=>
      `<img class="table-photo" src="${esc(p.url)}" onclick="openLb('${esc(p.url)}')" title="Переглянути фото">`
    ).join('');
    const approveBtn = !r.approved
      ? `<button class="btn-sm btn-approve" onclick="action('approve','${r.id}')">✓ Схвалити</button>`
      : `<button class="btn-sm btn-reject"  onclick="action('reject','${r.id}')">↩ Сховати</button>`;
    return `<tr>
      <td><input type="checkbox" ${chk} onchange="toggleSel('${r.id}',this.checked)"></td>
      <td>
        <div class="rev-author">${esc(r.author_name)}</div>
        <div class="rev-product">${esc(r.product_id)}</div>
        <div class="rev-date">${fmtD(r.created_at)}</div>
      </td>
      <td><div class="stars-mini">${starsHtml(r.rating)}</div></td>
      <td>
        ${r.title?`<div class="rev-title">${esc(r.title)}</div>`:''}
        <div class="rev-body">${esc(r.body)}</div>
        ${photos?`<div class="table-photos">${photos}</div>`:''}
      </td>
      <td>${status}</td>
      <td>
        <div class="rev-actions">
          ${approveBtn}
          <button class="btn-sm btn-edit"   onclick="openEdit('${r.id}')">✎ Редагувати</button>
          <button class="btn-sm btn-delete" onclick="action('delete','${r.id}')">✕ Видалити</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('tbl-wrap').innerHTML = `
    <table class="rev-table">
      <thead><tr>
        <th><input type="checkbox" ${allChecked?'checked':''} onchange="toggleAll(this.checked)" style="accent-color:var(--gold)"></th>
        <th>Автор / Товар</th><th>Оцінка</th><th>Відгук</th><th>Статус</th><th>Дії</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

/* ══════════════════════════════════════════
   PAGINATION
══════════════════════════════════════════ */
function renderPagination() {
  const pages = Math.ceil(st.total/PAGE_SIZE);
  if (pages<=1) { document.getElementById('pagination').innerHTML=''; return; }
  let h = `<button class="page-btn" onclick="goPage(${st.page-1})" ${st.page===0?'disabled':''}>‹</button>`;
  for(let i=0;i<pages;i++){
    if(pages>7 && Math.abs(i-st.page)>2 && i!==0 && i!==pages-1){ if(i===st.page-3||i===st.page+3) h+=`<span style="color:var(--muted);padding:0 4px">…</span>`; continue; }
    h+=`<button class="page-btn${i===st.page?' active':''}" onclick="goPage(${i})">${i+1}</button>`;
  }
  h+=`<button class="page-btn" onclick="goPage(${st.page+1})" ${st.page>=pages-1?'disabled':''}>›</button>`;
  document.getElementById('pagination').innerHTML=h;
}
function goPage(p){ st.page=p; reload(); window.scrollTo({top:0,behavior:'smooth'}); }

/* ══════════════════════════════════════════
   SELECTION
══════════════════════════════════════════ */
function toggleSel(id,on){ on?st.selected.add(id):st.selected.delete(id); updateBulkBar(); renderTable(); }
function toggleAll(on){ st.reviews.forEach(r=>on?st.selected.add(r.id):st.selected.delete(r.id)); updateBulkBar(); renderTable(); }
function clearSel(){ st.selected.clear(); updateBulkBar(); renderTable(); }
function updateBulkBar(){
  const n=st.selected.size;
  document.getElementById('sel-count').textContent=n;
  document.getElementById('bulk-bar').classList.toggle('show',n>0);
}

/* ══════════════════════════════════════════
   ACTIONS (approve / reject / delete)
══════════════════════════════════════════ */
async function action(type, id) {
  try {
    if(type==='approve') { await sbPatch(`reviews?id=eq.${id}`,{approved:true}); toast('Відгук опубліковано ✓','ok'); }
    else if(type==='reject') { await sbPatch(`reviews?id=eq.${id}`,{approved:false}); toast('Відгук приховано','ok'); }
    else if(type==='delete') {
      if(!confirm('Видалити відгук? Незворотньо.')) return;
      await sbDelete(`review_photos?review_id=eq.${id}`);
      await sbDelete(`reviews?id=eq.${id}`);
      toast('Відгук видалено','ok');
    }
    st.selected.delete(id);
    await loadStats(); await reload();
  } catch(e) { toast('Помилка: '+e.message,'err'); }
}

async function bulkAction(type) {
  if(!st.selected.size) return;
  const ids=[...st.selected];
  if(type==='delete'&&!confirm(`Видалити ${ids.length} відгуків?`)) return;
  try {
    const f=ids.map(id=>`id=eq.${id}`).join(',');
    if(type==='approve'){ await sbPatch(`reviews?or=(${f})`,{approved:true}); toast(`Опубліковано ${ids.length} ✓`,'ok'); }
    else {
      await sbDelete(`review_photos?or=(${ids.map(id=>`review_id=eq.${id}`).join(',')})`);
      await sbDelete(`reviews?or=(${f})`);
      toast(`Видалено ${ids.length}`,'ok');
    }
    st.selected.clear(); await loadStats(); await reload();
  } catch(e) { toast('Помилка: '+e.message,'err'); }
}

/* ══════════════════════════════════════════
   EDIT MODAL — відкрити
══════════════════════════════════════════ */
function openEdit(id) {
  const r = st.reviews.find(x=>x.id===id);
  if (!r) return;
  editingId = id;
  editPhotos = (r._photos||[]).map(p=>({...p})); // копія

  // Заповнити поля
  document.getElementById('modal-author-label').textContent = r.author_name;
  document.getElementById('m-name').value    = r.author_name || '';
  document.getElementById('m-title').value   = r.title || '';
  document.getElementById('m-body').value    = r.body || '';
  document.getElementById('m-reply').value   = r.reply_text || '';
  document.getElementById('m-product').value = r.product_id || '';
  document.getElementById('m-fit').value     = r.size_fit || '';
  document.getElementById('m-verified').checked = !!r.verified;
  updateCharCount();

  // Дата: перетворити UTC → local datetime-local format
  const d = new Date(r.created_at);
  const pad = n => String(n).padStart(2,'0');
  const local = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  document.getElementById('m-date').value = local;

  // Рейтинг
  document.querySelectorAll('input[name="m-rating"]').forEach(inp => {
    inp.checked = +inp.value === r.rating;
  });

  // Фото
  renderModalPhotos();

  document.getElementById('edit-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderModalPhotos() {
  const section = document.getElementById('modal-photos-section');
  const wrap    = document.getElementById('modal-photos');
  if (!editPhotos.length) { section.style.display='none'; return; }
  section.style.display='';
  wrap.innerHTML = editPhotos.map((p,i)=>`
    <div class="modal-photo-wrap">
      <img src="${esc(p.url)}" onclick="openLb('${esc(p.url)}')" title="Натисніть для збільшення">
      <button class="modal-photo-del" onclick="removeModalPhoto(${i})" title="Видалити фото">✕</button>
    </div>`).join('');
}

function removeModalPhoto(i) {
  // Позначаємо для видалення при збереженні
  editPhotos[i]._toDelete = true;
  editPhotos.splice(i, 1);
  renderModalPhotos();
}

function updateCharCount() {
  const v = document.getElementById('m-body').value.length;
  document.getElementById('m-char').textContent = `${v} / 1400`;
}
document.getElementById('m-body').addEventListener('input', updateCharCount);

/* ══════════════════════════════════════════
   EDIT MODAL — зберегти
══════════════════════════════════════════ */
async function saveEdit() {
  const name  = document.getElementById('m-name').value.trim();
  const body  = document.getElementById('m-body').value.trim();
  const rEl   = document.querySelector('input[name="m-rating"]:checked');

  if (!name) return toast('Введіть ім\'я автора','err');
  if (!body) return toast('Текст відгуку не може бути порожнім','err');

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Зберігаємо…';

  try {
    // Підготувати дату (datetime-local → ISO)
    const dateVal = document.getElementById('m-date').value;
    const isoDate = dateVal ? new Date(dateVal).toISOString() : undefined;

    const replyText = document.getElementById('m-reply').value.trim();

    const payload = {
      author_name: name,
      body,
      title:    document.getElementById('m-title').value.trim() || null,
      product_id: document.getElementById('m-product').value.trim(),
      size_fit: document.getElementById('m-fit').value || null,
      verified: document.getElementById('m-verified').checked,
      reply_text: replyText || null,
      reply_date: replyText ? new Date().toISOString() : null,
      ...(rEl ? { rating: +rEl.value } : {}),
      ...(isoDate ? { created_at: isoDate } : {}),
    };

    await sbPatch(`reviews?id=eq.${editingId}`, payload);

    // Видалити відмічені фото
    const toDelete = (editPhotos._deleted || []);
    // Оскільки ми видаляємо зі splice, відстежуємо через окремий масив
    for (const pid of (window._photosToDelete||[])) {
      try { await sbDelete(`review_photos?id=eq.${pid}`); } catch {}
    }
    window._photosToDelete = [];

    toast('Зміни збережено ✓','ok');
    closeModalDirect();
    await loadStats(); await reload();
  } catch(e) {
    toast('Помилка: '+e.message,'err');
  }
  btn.disabled=false; btn.textContent='Зберегти зміни';
}

// Перевизначаємо removeModalPhoto щоб зберігати id для видалення
window._photosToDelete = [];
function removeModalPhoto(i) {
  const p = editPhotos[i];
  if (p.id) window._photosToDelete.push(p.id);
  editPhotos.splice(i,1);
  renderModalPhotos();
}

/* ══════════════════════════════════════════
   MODAL — закрити
══════════════════════════════════════════ */
function closeModal(e) {
  if (e.target === document.getElementById('edit-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('edit-overlay').classList.remove('open');
  document.body.style.overflow='';
  editingId=null; editPhotos=[];
  window._photosToDelete=[];
}
document.addEventListener('keydown', e => { if(e.key==='Escape') { closeLb(); closeModalDirect(); } });

/* ══════════════════════════════════════════
   FILTER
══════════════════════════════════════════ */
function setView(v,btn) {
  st.view=v; st.page=0;
  document.querySelectorAll('.sidebar-btn[data-view]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); reload();
}
function setRating(r,btn) {
  st.rating=r; st.page=0;
  document.querySelectorAll('.sidebar-btn[data-rating]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); reload();
}
let searchTimer;
function onSearch(){ clearTimeout(searchTimer); searchTimer=setTimeout(()=>{ st.page=0; reload(); },350); }

/* ══════════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════════ */
function openLb(url){ document.getElementById('lb-img').src=url; document.getElementById('lb').classList.add('open'); }
function closeLb(){ document.getElementById('lb').classList.remove('open'); }

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
function toast(msg,type='ok'){
  const wrap=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className=`toast ${type}`; el.textContent=msg;
  wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}

/* ══════════════════════════════════════════
   AUTO-INIT
══════════════════════════════════════════ */
if (sessionStorage.getItem('adm')==='1') init();
</script>
</body>
</html>
